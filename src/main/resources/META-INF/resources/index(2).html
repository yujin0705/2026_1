<!DOCTYPE html>
<html lang="ko">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>QuarkusHello World</title>
    <style>
        body { background-color: #0a0e17; color: #fff; }
        accent-purple { color: #a020f0; }
        card { background-color: #131313; border: none; color: white; }
        btn-primary { background-color: #a020f0; border: none; }
        .card {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: scale(1.05); /* 마우스를 올리면 커짐 */
            box-shadow: 0 10px 20px rgba(160, 32, 240, 0.5); /* 보라색 광원 효과 */
        }
        .card-img-top {
            height: 200px;
            object-fit: cover; /* 이미지가 찌그러지지 않게 채움 */
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid"><a class="navbar-brand" href="#">League of Legends</a></div>
</nav>
    <p>적의 넥서스를 파괴하세요! 5v5 MOBA 전투에서 팀과 함께 승리하세요.</p>

    <div class="container my-5">
        <div class="row">
        <div class="col-md-4">
            <div class="card">
                <img src="https://ddragon.leagueoflegends.com/cdn/15.24.1/img/champion/Aatrox.png" class="card-img-top">
                <div class="card-body">
                    <h5>Aatrox</h5>
                    <p>어둠의검으로적을베세요.</p>
                </div>

        </div>
        </div>
    </div>

    </ul>
    <h2>최신 뉴스</h2>
    <div>
    <h3>새로운 챔피언 출시</h3>
