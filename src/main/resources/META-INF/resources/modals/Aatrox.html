<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아트록스 상세</title>
  
  <!-- Bootstrap 5 CSS (index.html과 동일하게 연동) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- LOL 스타일 맞추기 위한 간단 커스텀 (필요 시 resources/css/custom.css로 이동) -->
  <style>
    body {
      background-color: #0a0e17;
      color: white;
      padding: 1.5rem;
      font-family: 'Segoe UI', sans-serif;
    }
    h3, h4 {
      color: #c8aa6e; /* LOL 골드 톤 */
    }
    .text-muted {
      color: #a0a0a0 !important;
    }
    .list-group-item {
      background: transparent;
      border-color: #444;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container-fluid">
    <div class="row g-4">
      
      <!-- 왼쪽: 이미지 + 기본 정보 -->
      <div class="col-lg-5 text-center">
        <img src="../images/Aatrox.png" class="img-fluid rounded shadow-lg" alt="아트록스" style="max-height: 480px; object-fit: contain;">
        <div class="mt-3">
          <h3 class="mb-1">아트록스 (Aatrox)</h3>
          <p class="text-muted fs-5">전사 / 난이도: 상</p>
        </div>
      </div>
      
      <!-- 오른쪽: 스킬 + 스토리 -->
      <div class="col-lg-7">
        <h4 class="border-bottom border-secondary pb-2 mb-3">스킬</h4>
        <ul class="list-group list-group-flush mb-4">
          <li class="list-group-item">패시브: 죽음의 손아귀</li>
          <li class="list-group-item">Q: 다르킨의 검</li>
          <li class="list-group-item">W: 지옥사슬</li>
          <li class="list-group-item">E: 그림자 돌진</li>
          <li class="list-group-item">R: 세계의 종결자</li>
        </ul>

        <h4 class="border-bottom border-secondary pb-2 mb-3">배경 스토리 요약</h4>
        <p class="text-secondary lh-lg">
          한때 신성한 전쟁의 신이었던 아트록스는 다르킨의 힘에 의해 타락했다. 
          이제 그는 끝없는 복수와 자신의 진정한 육체를 되찾기 위해 세계를 피로 물들인다. 
          그의 검은 모든 것을 파괴하며, 죽음조차 두려워하지 않는 존재가 되었다.
        </p>
      </div>
      
    </div>
  </div>

</body>
</html>
